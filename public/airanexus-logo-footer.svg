<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" fill="none" role="img" aria-label="Aira Nexus Logo">
  <title>Aira Nexus</title>

  <!-- Wordmark: "aira" -->
  <text font-family="'Plus Jakarta Sans','Nunito','Arial Rounded MT Bold',Arial,sans-serif" font-size="64" font-weight="800" fill="#1FA7A0" letter-spacing="-1.5">
    <tspan x="6" y="78">a</tspan>
    <tspan x="56" y="78">i</tspan>
  </text>
  <circle cx="71" cy="16" r="6" fill="#6AC139"/>
  <text font-family="'Plus Jakarta Sans','Nunito','Arial Rounded MT Bold',Arial,sans-serif" font-size="64" font-weight="800" fill="#6AC139">
    <tspan x="86" y="78">r</tspan>
  </text>
  <text font-family="'Plus Jakarta Sans','Nunito','Arial Rounded MT Bold',Arial,sans-serif" font-size="64" font-weight="800" fill="#1FA7A0">
    <tspan x="124" y="78">a</tspan>
  </text>

  <!-- "nexus" in white (for dark backgrounds) -->
  <text font-family="'Plus Jakarta Sans','Nunito','Arial Rounded MT Bold',Arial,sans-serif" font-size="64" font-weight="800" fill="#FFFFFF" letter-spacing="-1.5">
    <tspan x="186" y="78">nexus</tspan>
  </text>

  <!-- Connected nodes icon -->
  <g transform="translate(470,60) rotate(12)">
    <line x1="0" y1="0" x2="-24" y2="-18" stroke="#1FA7A0" stroke-width="5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="24" y2="-18" stroke="#1FA7A0" stroke-width="5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-22" y2="20" stroke="#1FA7A0" stroke-width="5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="25" y2="19" stroke="#6AC139" stroke-width="5" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="6" fill="#1FA7A0"/>
    <circle cx="-32" cy="-24" r="11" fill="#6AC139"/>
    <circle cx="-32" cy="-24" r="15" fill="none" stroke="#6AC139" stroke-width="2" opacity="0.55"/>
    <circle cx="32" cy="-24" r="11" fill="#1FA7A0"/>
    <circle cx="32" cy="-24" r="15" fill="none" stroke="#1FA7A0" stroke-width="2" opacity="0.55"/>
    <circle cx="-29" cy="26" r="10" fill="#1FA7A0"/>
    <circle cx="-29" cy="26" r="14" fill="none" stroke="#1FA7A0" stroke-width="2" opacity="0.55"/>
    <circle cx="33" cy="25" r="10" fill="#6AC139"/>
    <circle cx="33" cy="25" r="14" fill="none" stroke="#6AC139" stroke-width="2" opacity="0.55"/>
  </g>
